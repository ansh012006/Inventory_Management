<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service Log</title>
<style>
        body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #070F2B; /* Dark navy background */
        color: #fff;
    }
    /* Navbar */
    .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #1B1A55; /* Indigo navbar */
        padding: 10px 20px;
        color: #fff;
        position: sticky;
        top: 0;
        z-index: 1000;
    }
    .navbar img {
        height: 40px;
        width: auto;
    }
    .navbar h2 {
        margin: 0;
        font-size: 20px;
        color: #9290C3; /* Accent title color */
    }

    /* Secondary Nav */
    .subnav {
        background: #535C91;
        padding: 10px 0;
        text-align: center;
    }
    .subnav button {
        background: #9290C3;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        color: #070F2B;
        font-weight: bold;
    }
    .subnav button:hover {
        background: #1B1A55;
        color: #fff;
    }

    /* Page content */
    .container {
        padding: 20px;
    }
    h1 {
        color: #9290C3; /* Accent color */
        margin-bottom: 15px;
    }
    .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    input, button {
        padding: 8px;
        font-size: 14px;
        border: 1px solid #535C91;
        border-radius: 5px;
    }
    input {
        background: #1B1A55;
        color: #fff;
    }
    button {
        background: #535C91;
        color: white;
        cursor: pointer;
        border: none;
    }
    button:hover {
        background: #9290C3;
        color: #070F2B;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: #1B1A55; /* Table background */
        color: #fff;
    }
    th, td {
        padding: 10px;
        border-bottom: 1px solid #535C91;
        text-align: left;
    }
    th {
        background: #535C91;
        color: #fff;
    }
    tr:hover {
        background: #2c2b63; /* Slightly lighter hover shade */
    }
    @media (max-width: 768px) {
            nav {
                padding: 6px 16px;
                gap: 16px;
                min-height: 48px;
            }
        }

        nav {
            background: rgba(27, 26, 85, 0.8);
            backdrop-filter: var(--backdrop-blur);
            display: flex;
            align-items: center;
            padding: 8px 32px;
            gap: 24px;
            box-shadow: 0 4px 20px var(--shadow);
            border-bottom: 1px solid var(--glass-border);
            min-height: 56px;
        }

        @media (max-width: 768px) {
            nav a {
                height: 36px;
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }

        nav a {
            color: var(--text-primary);
            font-weight: 600;
            padding: 8px 20px;
            border-radius: var(--border-radius);
            transition: var(--transition);
            user-select: none;
            display: flex;
            align-items: center;
            height: 40px;
            border: 2px solid transparent;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            position: relative;
            overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: var(--backdrop-blur);
            text-decoration: none;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(7, 15, 43, 0.8);
            backdrop-filter: var(--backdrop-blur);
            color: var(--text-primary);
            padding: 16px 32px;
            box-shadow: 0 8px 32px var(--shadow-heavy);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--glass-border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        header img {
            height: 52px;
            filter: brightness(1.2) contrast(1.3);
            border-radius: var(--border-radius);
            border: 2px solid var(--glass-border);
            overflow-clip-margin: content-box;
            overflow: clip;
        }

        .animated-title {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--text-primary), var(--light-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--light-purple);
            display: inline-block;
            animation: blink 0.7s infinite;
        }

        header h1 {
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--text-primary), var(--light-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
            display: block;
            font-size: 2em;
            margin-block-start: 0.67em;
            margin-block-end: 0.67em;
            margin-inline-start: 0px;
            margin-inline-end: 0px;
            font-weight: bold;
            unicode-bidi: isolate;
        }
        .bodyy{
            padding: 15px;
        }
</style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="static/download.png" alt="SRMS Logo" />
            <h1 id="mainTitle" class="animated-title"></h1>

        </div>
    </header>


    <nav>
        <a href="/">Home</a>
        <a href="/add">📝 Add Machine</a>
        <a href="/view">📊 View Machines</a>
    </nav>


<div class="bodyy">
    <h1>Service Log</h1>
<div class="controls">
    <input type="text" id="search" placeholder="Search logs..." oninput="filterLogs()">
    <input type="date" id="dateFilter" onchange="filterLogs()">
    <button onclick="clearFilters()">Clear Filters</button>
    <button onclick="location.reload()">Refresh</button>
</div>

<table id="logTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Message</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.date }}</td>
            <td>{{ log.msg }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
<script>
function filterLogs() {
    let search = document.getElementById("search").value.toLowerCase();
    let dateFilter = document.getElementById("dateFilter").value;
    let rows = document.querySelectorAll("#logTable tbody tr");

    rows.forEach(row => {
        let date = row.cells[0].innerText;
        let message = row.cells[1].innerText.toLowerCase();
        let show = true;

        if (search && !message.includes(search)) {
            show = false;
        }
        if (dateFilter && date !== dateFilter) {
            show = false;
        }

        row.style.display = show ? "" : "none";
    });
}

function clearFilters() {
    document.getElementById("search").value = "";
    document.getElementById("dateFilter").value = "";
    filterLogs();
}
</script>

</body>
</html>
